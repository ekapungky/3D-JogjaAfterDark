<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jogja After Dark AAA Physics</title>
<style>
html,body{margin:0;overflow:hidden;background:#05000b;font-family:Arial}
#hud{position:fixed;top:12px;left:12px;color:#fff;z-index:10;
background:rgba(0,0,0,.4);padding:10px 12px;border-radius:12px}
#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
color:#fff;background:rgba(0,0,0,.35);padding:10px 14px;border-radius:14px}
</style>
</head>
<body>
<div id="hud">AAA Physics Mode<br/>WASD movement + rigidbody</div>
<div id="hint">Explore zones • Physics enabled (impulse-based)</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";
import RAPIER from "https://cdn.skypack.dev/@dimforge/rapier3d-compat";

let scene,camera,renderer;
let world,body;
let keys={};

const zones=[
  {name:"Keraton",pos:[0,0,0],color:0xff2fa3},
  {name:"Taman Sari",pos:[25,0,-20],color:0x7b32ff},
  {name:"Malioboro",pos:[-30,0,10],color:0x28d8ff},
  {name:"Kota Gede",pos:[40,0,25],color:0xff315d},
  {name:"Selarong",pos:[-50,0,-30],color:0x38f7a3}
];

init();

async function init(){

  await RAPIER.init();

  scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0x05000b,10,120);

  camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,500);
  camera.position.set(0,6,12);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,.7));
  const d=new THREE.DirectionalLight(0xff66aa,1.2);
  d.position.set(10,20,10);
  scene.add(d);

  world=new RAPIER.World({x:0,y:-9.81,z:0});

  const ground=world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
  world.createCollider(RAPIER.ColliderDesc.cuboid(80,1,80),ground);

  const gmesh=new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x120018})
  );
  gmesh.rotation.x=-Math.PI/2;
  scene.add(gmesh);

  body=world.createRigidBody(
    RAPIER.RigidBodyDesc.dynamic().setTranslation(0,2,10)
  );
  world.createCollider(RAPIER.ColliderDesc.ball(0.8),body);

  const car=new THREE.Mesh(
    new THREE.BoxGeometry(1.6,0.8,2.6),
    new THREE.MeshStandardMaterial({color:0xff2fa3})
  );
  scene.add(car);

  zones.forEach(z=>{
    const m=new THREE.Mesh(
      new THREE.TorusGeometry(2,0.2,8,20),
      new THREE.MeshBasicMaterial({color:z.color})
    );
    m.rotation.x=Math.PI/2;
    m.position.set(z.pos[0],0.1,z.pos[2]);
    scene.add(m);
  });

  window.addEventListener("keydown",e=>keys[e.code]=true);
  window.addEventListener("keyup",e=>keys[e.code]=false);

  function loop(){
    requestAnimationFrame(loop);

    world.step();

    const impulse=6;

    if(keys["KeyW"]) body.applyImpulse({x:0,y:0,z:-impulse},true);
    if(keys["KeyS"]) body.applyImpulse({x:0,y:0,z:impulse},true);
    if(keys["KeyA"]) body.applyImpulse({x:-impulse,y:0,z:0},true);
    if(keys["KeyD"]) body.applyImpulse({x:impulse,y:0,z:0},true);

    const p=body.translation();
    car.position.set(p.x,p.y,p.z);

    camera.position.lerp(new THREE.Vector3(p.x+6,p.y+6,p.z+10),0.08);
    camera.lookAt(p.x,p.y,p.z);

    renderer.render(scene,camera);
  }

  loop();
}
</script>
</body>
</html>
